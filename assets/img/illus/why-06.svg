  <!-- Traits de reflet autour de la médaille -->
  <line x1="100" y1="62" x2="100" y2="55" stroke="#F0A000" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="122" y1="70" x2="127" y2="63" stroke="#F0A000" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="78" y1="70" x2="73" y2="63" stroke="#F0A000" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="136" y1="90" x2="142" y2="86" stroke="#F0A000" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="90" x2="58" y2="86" stroke="#F0A000" stroke-width="2" stroke-linecap="round"/>
  <!-- Accents verts -->
  <circle cx="62" cy="28" r="4" fill="#78B428" opacity="0.7"/>
  <circle cx="138" cy="28" r="4" fill="#78B428" opacity="0.7"/>
  <circle cx="156" cy="108" r="5" fill="#78B428" opacity="0.5"/>
  <circle cx="44" cy="108" r="5" fill="#78B428" opacity="0.5"/>
</svg>
