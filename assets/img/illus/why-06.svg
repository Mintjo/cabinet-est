<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160">
  <rect width="200" height="160" fill="#EBF3FD" rx="12"/>
  <!-- Rubans -->
  <rect x="88" y="10" width="13" height="65" rx="4" fill="#003C8C"/>
  <rect x="103" y="10" width="13" height="65" rx="4" fill="#0050A0"/>
  <!-- Médaille — disque or -->
  <circle cx="100" cy="108" r="40" fill="#F0A000"/>
