<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="t1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0078C8"/>
      <stop offset="1" stop-color="#0050A0"/>
    </linearGradient>
  </defs>
  <rect width="200" height="160" fill="#EBF3FD" rx="14"/>
  <!-- écouteurs -->
  <circle cx="72" cy="36" r="8" fill="#003C8C"/>
  <circle cx="128" cy="36" r="8" fill="#003C8C"/>
  <!-- barre supérieure -->
  <line x1="72" y1="36" x2="128" y2="36" stroke="#003C8C" stroke-width="6" stroke-linecap="round"/>
  <!-- branches vers le bas -->
  <line x1="72" y1="44" x2="72" y2="62" stroke="#0050A0" stroke-width="6" stroke-linecap="round"/>
  <line x1="128" y1="44" x2="128" y2="62" stroke="#0050A0" stroke-width="6" stroke-linecap="round"/>
  <!-- tube courbe -->
  <path d="M72 62 Q72 108 100 108 Q128 108 128 122" fill="none" stroke="url(#t1)" stroke-width="7" stroke-linecap="round"/>
  <!-- membrane -->
  <circle cx="128" cy="126" r="18" fill="url(#t1)"/>
  <circle cx="128" cy="126" r="10" fill="#EBF3FD"/>
  <!-- croix médicale -->
  <line x1="128" y1="120" x2="128" y2="132" stroke="#0078C8" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="122" y1="126" x2="134" y2="126" stroke="#0078C8" stroke-width="3.5" stroke-linecap="round"/>
  <!-- décos -->
  <circle cx="42" cy="48" r="6" fill="#78B428" opacity="0.6"/>
  <circle cx="52" cy="126" r="5" fill="#F0A000" opacity="0.6"/>
</svg>
