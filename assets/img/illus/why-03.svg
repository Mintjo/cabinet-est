<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160">
  <rect width="200" height="160" fill="#EBF3FD" rx="12"/>
  <!-- Grille légère -->
  <line x1="48" y1="42" x2="166" y2="42" stroke="#C5DFFB" stroke-width="1"/>
  <line x1="48" y1="67" x2="166" y2="67" stroke="#C5DFFB" stroke-width="1"/>
  <line x1="48" y1="92" x2="166" y2="92" stroke="#C5DFFB" stroke-width="1"/>
  <!-- Axes -->
  <line x1="48" y1="24" x2="48" y2="122" stroke="#003C8C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48" y1="122" x2="172" y2="122" stroke="#003C8C" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Barres croissantes -->
  <rect x="60" y="94" width="22" height="28" rx="4" fill="#003C8C"/>
  <rect x="95" y="70" width="22" height="52" rx="4" fill="#0050A0"/>
  <rect x="130" y="40" width="22" height="82" rx="4" fill="#78B428"/>
  <!-- Ligne de tendance orange -->
  <polyline points="71,86 106,62 141,32" fill="none" stroke="#F0A000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Flèche montante -->
  <polygon points="141,32 132,35 135,43" fill="#F0A000"/>
  <!-- Points sur la tendance -->
  <circle cx="71" cy="86" r="4" fill="#F0A000"/>
  <circle cx="106" cy="62" r="4" fill="#F0A000"/>
  <circle cx="141" cy="32" r="4" fill="#F0A000"/>
  <!-- Accent -->
  <circle cx="170" cy="112" r="5" fill="#F0A000" opacity="0.5"/>
</svg>
