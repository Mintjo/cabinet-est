<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160">
  <rect width="200" height="160" fill="#EBF3FD" rx="12"/>
  <!-- Grand engrenage — 8 dents (center 80,82) -->
  <rect x="-6" y="-44" width="12" height="12" rx="3" fill="#003C8C" transform="translate(80,82)"/>
  <rect x="-6" y="-44" width="12" height="12" rx="3" fill="#003C8C" transform="translate(80,82) rotate(45)"/>
  <rect x="-6" y="-44" width="12" height="12" rx="3" fill="#003C8C" transform="translate(80,82) rotate(90)"/>
  <rect x="-6" y="-44" width="12" height="12" rx="3" fill="#003C8C" transform="translate(80,82) rotate(135)"/>
  <rect x="-6" y="-44" width="12" height="12" rx="3" fill="#003C8C" transform="translate(80,82) rotate(180)"/>
  <rect x="-6" y="-44" width="12" height="12" rx="3" fill="#003C8C" transform="translate(80,82) rotate(225)"/>
  <rect x="-6" y="-44" width="12" height="12" rx="3" fill="#003C8C" transform="translate(80,82) rotate(270)"/>
  <rect x="-6" y="-44" width="12" height="12" rx="3" fill="#003C8C" transform="translate(80,82) rotate(315)"/>
  <circle cx="80" cy="82" r="32" fill="#003C8C"/>
  <circle cx="80" cy="82" r="10" fill="#EBF3FD"/>
  <!-- Engrenage moyen — 6 dents (center 132,50) -->
  <rect x="-4" y="-27" width="8" height="8" rx="2" fill="#0050A0" transform="translate(132,50)"/>
  <rect x="-4" y="-27" width="8" height="8" rx="2" fill="#0050A0" transform="translate(132,50) rotate(60)"/>
  <rect x="-4" y="-27" width="8" height="8" rx="2" fill="#0050A0" transform="translate(132,50) rotate(120)"/>
  <rect x="-4" y="-27" width="8" height="8" rx="2" fill="#0050A0" transform="translate(132,50) rotate(180)"/>
  <rect x="-4" y="-27" width="8" height="8" rx="2" fill="#0050A0" transform="translate(132,50) rotate(240)"/>
  <rect x="-4" y="-27" width="8" height="8" rx="2" fill="#0050A0" transform="translate(132,50) rotate(300)"/>
  <circle cx="132" cy="50" r="20" fill="#0050A0"/>
  <circle cx="132" cy="50" r="6" fill="#EBF3FD"/>
  <!-- Petit engrenage accent — 4 dents (center 150,118) -->
  <rect x="-3" y="-17" width="6" height="6" rx="1.5" fill="#F0A000" transform="translate(150,118)"/>
  <rect x="-3" y="-17" width="6" height="6" rx="1.5" fill="#F0A000" transform="translate(150,118) rotate(90)"/>
  <rect x="-3" y="-17" width="6" height="6" rx="1.5" fill="#F0A000" transform="translate(150,118) rotate(180)"/>
  <rect x="-3" y="-17" width="6" height="6" rx="1.5" fill="#F0A000" transform="translate(150,118) rotate(270)"/>
  <circle cx="150" cy="118" r="12" fill="#F0A000"/>
  <circle cx="150" cy="118" r="4" fill="#EBF3FD"/>
</svg>
